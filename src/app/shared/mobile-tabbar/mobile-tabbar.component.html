<!-- ══ MOBILE BOTTOM TAB BAR (Flipkart-style) ══ -->
<nav class="mt-tabbar" aria-label="Mobile navigation">
  <a routerLink="/" (click)="scrollToTop()" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="mt-tab">
    <i class="fa-solid fa-house"></i>
    <span>Home</span>
  </a>

  <a routerLink="/products" (click)="scrollToTop()" routerLinkActive="active" class="mt-tab">
    <i class="fa-solid fa-shirt"></i>
    <span>Shop</span>
  </a>

  <a routerLink="/cart" (click)="scrollToTop()" routerLinkActive="active" class="mt-tab mt-tab--cart">
    <span class="mt-tab__icon-wrap">
      <i class="fa-solid fa-cart-shopping"></i>
      @if (cartService.cart().totalItems > 0) {
        <span class="mt-tab__badge">{{ cartService.cart().totalItems }}</span>
      }
    </span>
    <span>Cart</span>
  </a>

  <a routerLink="/wishlist" (click)="scrollToTop()" routerLinkActive="active" class="mt-tab">
    <i class="fa-regular fa-heart"></i>
    <span>Wishlist</span>
  </a>

  <a [routerLink]="authService.isLoggedIn() ? dashboardLink : '/login'" (click)="scrollToTop()" routerLinkActive="active" class="mt-tab">
    <i class="fa-regular fa-user"></i>
    <span>{{ authService.isLoggedIn() ? 'Account' : 'Sign In' }}</span>
  </a>
</nav>
